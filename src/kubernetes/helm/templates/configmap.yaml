apiVersion: v1
kind: ConfigMap
metadata:
  name: cinemaabyss-config
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: {{ include "cinemaabyss.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  # Database configuration
  DB_HOST: {{ .Values.database.host | quote }}
  DB_PORT: {{ .Values.database.port | quote }}
  DB_NAME: {{ .Values.database.name | quote }}
  DB_USER: {{ .Values.database.user | quote }}

  # Service URLs - using FQDN for DNS resolution in this cluster
  MONOLITH_URL: "http://monolith.{{ .Values.global.namespace }}.svc.cluster.local:{{ .Values.monolith.service.port }}"
  MOVIES_SERVICE_URL: "http://movies-service.{{ .Values.global.namespace }}.svc.cluster.local:{{ .Values.moviesService.service.port }}"
  EVENTS_SERVICE_URL: "http://events-service.{{ .Values.global.namespace }}.svc.cluster.local:{{ .Values.eventsService.service.port }}"
  KAFKA_BROKERS: "kafka.{{ .Values.global.namespace }}.svc.cluster.local:9092"
  
  # Strangler Fig configuration
  GRADUAL_MIGRATION: {{ .Values.config.gradualMigration | quote }}
  MOVIES_MIGRATION_PERCENT: {{ .Values.config.moviesMigrationPercent | quote }}